<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- FOUC 방지: CSS 렌더 전에 테마 즉시 적용 -->
  <script>(function(){var t=localStorage.getItem("theme");if(t){document.documentElement.dataset.theme=t;}else if(window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches){document.documentElement.dataset.theme="dark";}})()</script>

  <!-- 다크모드 CSS (최우선 로드) -->
  <link rel="stylesheet" href="../common/darkmode.css">

  <title>뉴스 | WhatisF1</title>

  <!-- 공통 헤더 / 푸터 CSS -->
  <link rel="stylesheet" href="../common/header.css">
  <link rel="stylesheet" href="../common/footer.css">

  <!-- 뉴스 전용 CSS -->
  <link rel="stylesheet" href="./news.css">

  <!-- Twemoji -->
  <script src="https://cdn.jsdelivr.net/npm/twemoji@latest/dist/twemoji.min.js"></script>
</head>
<body>

  <!-- 헤더 -->
  <div id="header-container"></div>

  <!-- 메인 -->
  <main id="news-main">

    <!-- 카테고리 탭 -->
    <nav class="news-category-tabs">
      <button data-category="all" class="active">전체</button>
      <button data-category="team">팀</button>
      <button data-category="driver">드라이버</button>
      <button data-category="tech">기술</button>
      <button data-category="reg">규정</button>
      <button data-category="rumor">루머</button>
    </nav>

    <!-- 검색 -->
    <div class="news-search-wrap">
      <input type="search" id="newsSearch" class="news-search-input" placeholder="기사 검색...">
    </div>

    <!-- 소스 필터 -->
    <section class="news-source-filter">
      <select id="newsSourceFilter">
        <option value="all">전체 소스</option>
        <option value="official">공식</option>
        <option value="media">전문매체</option>
        <option value="reporter">기자</option>
        <option value="rumor">루머</option>
      </select>
    </section>

    <!-- 뉴스 카드 목록 -->
    <section id="newsContainer" class="news-list"></section>


  </main>

  <!-- 푸터 -->
  <div id="footer-container"></div>

  <!-- BASE_PATH 정의 (동기 로드) -->
  <script src="../common/config.js"></script>
  <script src="../common/darkmode.js"></script>

  <!-- 공통 JS -->
  <script src="../common/header.js"></script>
  <script src="../common/footer.js"></script>

  <!-- 뉴스 JS -->
  <script src="./news.js"></script>

</body>
</html>
