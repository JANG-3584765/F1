<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>뉴스 상세 | WhatisF1</title>

  <!-- FOUC 방지: CSS 렌더 전에 테마 즉시 적용 -->
  <script>(function(){var t=localStorage.getItem('theme');if(t){document.documentElement.dataset.theme=t;}else if(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches){document.documentElement.dataset.theme='dark';}})()</script>

  <!-- 다크모드 CSS (최우선 로드) -->
  <link rel="stylesheet" href="../common/darkmode.css">

  <!-- 공통 헤더 / 푸터 CSS -->
  <link rel="stylesheet" href="../common/header.css">
  <link rel="stylesheet" href="../common/footer.css">

  <!-- 상세 페이지 전용 CSS -->
  <link rel="stylesheet" href="./news_detail.css" />

  <!-- Twemoji -->
  <script src="https://cdn.jsdelivr.net/npm/twemoji@latest/dist/twemoji.min.js"></script>
</head>

<body>

  <!-- 헤더 -->
  <div id="header-container"></div>

  <!-- 메인 -->
  <main class="detail-wrapper">
    <button class="back-btn">← 뒤로가기</button>

    <article id="detailArticle" class="detail-article">
      <!-- JS로 채워짐 -->
    </article>
  </main>

  <!-- 푸터 -->
  <div id="footer-container"></div>

  <!-- BASE_PATH 정의 (동기 로드) -->
  <script src="../common/config.js"></script>
  <script src="../common/darkmode.js"></script>

  <!-- 공통 JS -->
  <script src="../common/header.js"></script>
  <script src="../common/footer.js"></script>

  <!-- 상세 페이지 전용 JS -->
  <script src="./news_detail.js"></script>

</body>
</html>
