<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- FOUC 방지: CSS 렌더 전에 테마 즉시 적용 -->
  <script>(function(){var t=localStorage.getItem("theme");if(t){document.documentElement.dataset.theme=t;}else if(window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches){document.documentElement.dataset.theme="dark";}})()</script>

  <!-- 다크모드 CSS (최우선 로드) -->
  <link rel="stylesheet" href="../common/darkmode.css">

  <title>로그인 - WhatisF1</title>

  <!-- 공통 헤더 CSS -->
  <link rel="stylesheet" href="../common/header.css">

  <!-- 로그인 페이지 CSS -->
  <link rel="stylesheet" href="./login.css">
</head>

<body class="auth-page">

  <!-- 헤더 -->
  <div id="header-container"></div>

  <!-- 로그인 메인 -->
  <main class="login-main">

    <div class="login-wrapper">
      <div class="login-card">
        <h2 class="login-title">로그인</h2>

        <form>
          <input type="text" placeholder="아이디" class="input-box">
          <input type="password" placeholder="비밀번호" class="input-box">
          <button type="submit" class="login-redbtn">로그인</button>

          <p class="signup-link">
            계정이 없으신가요? <a href="./signup.html">회원가입</a>
          </p>
        </form>
      </div>
    </div>

  </main>

  <!-- BASE_PATH 정의 (동기 로드) -->
  <script src="../common/config.js"></script>
  <script src="../common/darkmode.js"></script>

  <!-- 공통 헤더 JS -->
  <script src="../common/header.js"></script>

  <!-- 로그인 전용 JS -->
  <script src="./login.js"></script>

</body>
</html>
