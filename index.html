<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatisF1</title>

  <!-- 공통 헤더 / 푸터 CSS -->
  <link rel="stylesheet" href="./common/header.css">
  <link rel="stylesheet" href="./common/footer.css">

  <!-- 홈 메인 CSS -->
  <link rel="stylesheet" href="./home/nextrace/nextrace.css">
  <link rel="stylesheet" href="./home/mainnews/mainnews.css">
  <link rel="stylesheet" href="./home/highlight/highlight.css">
  <link rel="stylesheet" href="./home/standing/standing.css">
  <link rel="stylesheet" href="./home/guess/guess.css">

  <!-- Swiper -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js" defer></script>

  <!-- Twemoji -->
  <script src="https://cdn.jsdelivr.net/npm/twemoji@latest/dist/twemoji.min.js" defer></script>
</head>
<body>

  <!-- 헤더 -->
  <div id="header-container"></div>

  <!-- 메인 -->
  <main>
    <!-- 1. NEXT RACE -->
    <section id="next-race" class="next-race-section">
      <div id="next-race-box" class="next-race-box">
        <div class="next-race-header">
          <span class="flag">🏁</span>
          <div class="race-countdown">불러오는 중...</div>
        </div>
      </div>
      <div class="race-btns-wrap">
        <a href="./schedule/schedule.html" class="full-schedule-btn">전체 일정 보기</a>
        <a href="./result/result.html" class="past-results-btn">지난 경기 결과 보기</a>
      </div>
    </section>

    <!-- 2. MAIN NEWS -->
    <section id="main-news" class="main-news-section">
      <h2 class="section-title">Main News</h2>

      <div class="swiper main-news-swiper">
        <div class="swiper-wrapper" id="main-news-wrapper"></div>

        <!-- 화살표 -->
        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>
      </div>

      <div class="more-news-btn-wrap">
        <a href="./news/news.html" class="more-news-btn">뉴스 더보기</a>
      </div>
    </section>

    <!-- 3. HIGHLIGHT -->
    <section id="highlights" class="highlights-section">
      <h2 class="section-title">Highlights</h2>

      <div class="swiper highlights-swiper">
        <div class="swiper-wrapper" id="highlight-wrapper"></div>

        <!-- 화살표 -->
        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>
      </div>
    </section>

    <!-- 4. STANDING -->
    <section id="standing" class="standing-section">
      <div class="standing-header">
        <h2 class="section-title">TOP3</h2>
        <a href="./ranking/ranking.html" class="more-standing-btn">전체 순위 보기</a>
      </div>
      <div class="standing-tabs">
        <button class="tab active" data-type="driver">드라이버</button>
        <button class="tab" data-type="constructor">컨스트럭터</button>
      </div>
      <div class="podium" id="podium-container"></div>
    </section>

    <!-- 5. 승부예측 Quick Link -->
    <section id="guess" class="guess-section">
      <div class="guess-card" id="guess-card">
        <a href="./prediction/prediction.html" class="guess-btn">팬 투표 하러 가기</a>
      </div>
    </section>
  </main>

  <!-- 푸터 -->
  <div id="footer-container"></div>

  <!-- BASE_PATH 정의 (동기 로드) -->
  <script src="./common/config.js"></script>

  <!-- 공통 JS -->
  <script defer src="./common/header.js"></script>
  <script defer src="./common/footer.js"></script>

  <!-- 페이지 전용 JS -->
  <script defer src="./home/nextrace/nextrace.js"></script>
  <script defer src="./home/mainnews/mainnews.js"></script>
  <script defer src="./home/highlight/highlight.js"></script>
  <script defer src="./home/standing/standing.js"></script>

</body>
</html>
